    <!DOCTYPE html>

<title>AnimeWorld</title>

<style>
body {
  margin: 0;
  background: linear-gradient(to right, #0f0c29, #302b63, #24243e);
  color: white;
  text-align: center;
  font-family: Arial, sans-serif;
}

/* HEADER */
header {
  padding: 20px;
  font-size: 30px;
  font-weight: bold;
  background: rgba(0,0,0,0.6);
  letter-spacing: 2px;
}

/* CONTENU */
.container {
  margin-top: 100px;
}

h1 {
  font-size: 50px;
  color: gold;
}

p {
  font-size: 18px;
  opacity: 0.8;
}

/* BOUTON */
.btn {
  display: inline-block;
  margin-top: 30px;
  padding: 15px 35px;
  background: #6c5ce7;
  color: white;
  text-decoration: none;
  border-radius: 30px;
  transition: 0.3s;
}

.btn:hover {
  background: #a29bfe;
  transform: scale(1.1);
}

/* FOOTER */
footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  padding: 10px;
  background: rgba(0,0,0,0.5);
  font-size: 14px;
}
</style>

</head>

<body
<div class="anime" onclick="playVideo('naruto.mp4')">
<img src="https://via.placeholder.com/150x220?text=Naruto">
</div>

<div class="video" id="videoPlayer"></div>

<script>
function playVideo(src) {
document.getElementById("videoPlayer").innerHTML =
`<video width="100%" controls autoplay>
<source src="${src}" type="video/mp4">
</video>`;
}
</script>
}
</script>

</body>
